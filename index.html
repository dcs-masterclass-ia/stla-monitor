<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UAS Monitor — Maintenance</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f8fafc;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px}
.card{background:#fff;border-radius:24px;padding:48px 56px;box-shadow:0 10px 40px rgba(0,0,0,0.06);text-align:center;max-width:480px}
.icon{font-size:48px;margin-bottom:16px}
h1{font-size:24px;font-weight:900;color:#0f172a;margin-bottom:8px}
p{font-size:14px;color:#64748b;font-weight:600;line-height:1.6}
.badge{display:inline-flex;align-items:center;gap:8px;background:#fef3c7;color:#92400e;font-size:11px;font-weight:800;padding:6px 14px;border-radius:20px;margin-top:20px}
.dot{width:8px;height:8px;border-radius:50%;background:#f59e0b;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="card">
  <div class="icon">🔧</div>
  <h1>Maintenance en cours</h1>
  <p>Le dashboard UAS Monitor est temporairement indisponible.<br>Nous effectuons une mise à jour de l'infrastructure.</p>
  <div class="badge"><span class="dot"></span> Retour prévu dans quelques minutes</div>
</div>
<p style="font-size:11px;color:#94a3b8;font-weight:600">UAS Monitor — autobiz</p>
</body>
</html>
