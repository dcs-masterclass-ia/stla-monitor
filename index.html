<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STLA Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f0f4ff;min-height:100vh;position:relative;overflow-x:hidden}
.blob{position:fixed;border-radius:50%;filter:blur(100px);opacity:0.4;pointer-events:none;z-index:0}
.blob1{width:500px;height:500px;background:#bfdbfe;top:-120px;left:-120px;animation:o1 22s ease-in-out infinite}
.blob2{width:400px;height:400px;background:#e0e7ff;top:40%;right:-100px;animation:o2 18s ease-in-out infinite}
.blob3{width:300px;height:300px;background:#fef9c3;bottom:60px;left:35%;animation:o3 26s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}50%{transform:translate(-30px,40px)}}
@keyframes o3{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-40px)}}
.glass{background:rgba(255,255,255,0.8);backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);border-radius:32px;border:none;box-shadow:0 8px 60px rgba(59,90,224,0.07),0 2px 12px rgba(0,0,0,0.04)}

/* ── LANDING ── */
#landing{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem}
.landing-title{font-size:14px;font-weight:500;color:#4b5563;text-transform:uppercase;letter-spacing:.12em;margin-bottom:.75rem;text-align:center}
.landing-h1{font-size:42px;font-weight:900;letter-spacing:-0.04em;color:#111827;text-align:center;margin-bottom:.5rem}
.landing-sub{font-size:14px;color:#4b5563;text-align:center;margin-bottom:3rem}
.brand-cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.brand-card{width:300px;padding:2.5rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1.5rem;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden}
.brand-card:hover{transform:translateY(-6px);box-shadow:0 20px 80px rgba(59,90,224,0.14),0 4px 20px rgba(0,0,0,0.07)}
.brand-card .logo-wrap{height:80px;display:flex;align-items:center;justify-content:center}
.brand-card img{max-height:80px;max-width:180px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.1))}
.brand-card-name{font-size:18px;font-weight:900;letter-spacing:-0.03em;color:#111827}
.brand-card-desc{font-size:12px;color:#4b5563;text-align:center;line-height:1.5}
.brand-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.dot.ok{background:#22c55e;animation:pulse 2s ease-in-out infinite}
.dot.ko{background:#ef4444}
.dot.loading{background:#d1d5db}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.3)}}
.enter-btn{margin-top:.5rem;padding:10px 28px;border-radius:100px;font-size:12px;font-weight:800;border:none;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;letter-spacing:.04em;transition:all .2s}
.enter-btn.opel{background:#111827;color:#fff}
.enter-btn.ford{background:#0066cc;color:#fff}
.enter-btn:hover{opacity:.85}

/* ── DASHBOARD ── */
#dashboard{display:none;position:relative;z-index:1;padding:2rem 1.5rem;min-height:100vh}
.wrap{max-width:820px;margin:0 auto}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:#4b5563;cursor:pointer;margin-bottom:1.5rem;padding:8px 16px;border-radius:100px;background:rgba(255,255,255,0.7);border:none;font-family:'Plus Jakarta Sans',sans-serif;transition:all .2s}
.back-btn:hover{background:rgba(255,255,255,0.95)}
.dash-header{display:flex;align-items:center;gap:16px;margin-bottom:1.5rem}
.dash-logo{height:40px;object-fit:contain;filter:drop-shadow(0 1px 4px rgba(0,0,0,0.1))}
.dash-title-wrap h1{font-size:26px;font-weight:900;letter-spacing:-0.04em;color:#111827}
.ts{font-size:12px;color:#4b5563;margin-top:4px;display:flex;align-items:center;gap:6px}
.pulse-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
.pulse-dot.dead{background:#ef4444;animation:none}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:1.5rem}
.kpi{padding:1.2rem 1.4rem}
.kpi-label{font-size:11px;font-weight:500;color:#4b5563;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.kpi-val{font-size:28px;font-weight:900;letter-spacing:-0.03em;color:#111827}
.kpi-val.ok{color:#16a34a}.kpi-val.ko{color:#dc2626}.kpi-val.blue{color:#3b5ae0}
.kpi-sub{font-size:11px;color:#4b5563;margin-top:4px}
.scard-wrap{margin-bottom:12px;border-radius:24px;overflow:hidden}
.scard{padding:1rem 1.4rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:rgba(255,255,255,0.8);backdrop-filter:blur(40px);transition:box-shadow .2s}
.scard:hover{box-shadow:0 8px 40px rgba(59,90,224,0.1)}
.scard-left{display:flex;align-items:center;gap:14px}
.icon{width:42px;height:42px;border-radius:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon.ok{background:#dcfce7}.icon.ko{background:#fee2e2}
.scard-name{font-size:14px;font-weight:800;color:#111827;letter-spacing:-0.02em}
.scard-url{font-size:11px;color:#4b5563;margin-top:2px}
.badge{display:inline-block;padding:4px 14px;border-radius:100px;font-size:11px;font-weight:800}
.badge.ok{background:#dcfce7;color:#166534}.badge.ko{background:#fee2e2;color:#991b1b}
.resp-time{font-size:12px;color:#4b5563;margin-top:4px;text-align:right}
.error-detail{display:none;padding:1rem 1.4rem;background:rgba(254,242,242,0.6);border-top:1px solid rgba(239,68,68,0.1)}
.error-detail.show{display:block}
.diag-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px}
.diag-item{font-size:11px;color:#4b5563}.diag-item b{color:#111827}
.diag-body{margin-top:10px;font-size:11px;color:#991b1b;background:#fff1f2;border-radius:10px;padding:8px 12px;font-family:monospace;word-break:break-all}
.chart-wrap{padding:1.4rem;margin-bottom:1.5rem}
.section-title{font-size:13px;font-weight:800;color:#111827;letter-spacing:-0.02em;margin-bottom:1rem}
.legend{display:flex;gap:16px;margin-top:10px;flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:#4b5563;font-weight:500}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.incidents{padding:1.4rem}
.inc-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:1px solid rgba(0,0,0,0.05);font-size:12px;gap:8px}
.inc-row:last-child{border-bottom:none}
.inc-time{color:#4b5563;font-weight:500;min-width:110px;flex-shrink:0}
.inc-desc{color:#111827;font-weight:500;flex:1}
.inc-sub{font-size:10px;color:#4b5563;margin-top:2px}
.callout{border-radius:12px;padding:5px 12px;font-size:11px;font-weight:800;white-space:nowrap}
.callout.ok{background:#f0fdf4;color:#166534}.callout.ko{background:#fff1f2;color:#991b1b}
.empty{color:#4b5563;font-size:13px;padding:1rem 0}
</style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>
<div class="blob blob3"></div>

<!-- ── PAGE D'ACCUEIL ── -->
<div id="landing">
  <div class="landing-title">Monitoring</div>
  <div class="landing-h1">STLA Monitor</div>
  <div class="landing-sub">Sélectionnez une marque pour accéder à son dashboard</div>
  <div class="brand-cards">
    <div class="glass brand-card" onclick="openDash('Opel PT')">
      <div class="logo-wrap">
        <img src="https://www.stellantis.com/content/dam/stellantis-corporate/brands/opel/opel-logo.png" alt="Opel" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span style="display:none;font-size:24px;font-weight:900;color:#111827">OPEL</span>
      </div>
      <div>
        <div class="brand-card-name">Opel PT</div>
        <div class="brand-card-desc">retoma.opel.pt<br>Homepage + Parcours</div>
      </div>
      <div class="brand-status" id="status-Opel PT">
        <span class="dot loading"></span>
        <span>Chargement...</span>
      </div>
      <button class="enter-btn opel">Accéder au dashboard →</button>
    </div>

    <div class="glass brand-card" onclick="openDash('Ford FR')">
      <div class="logo-wrap">
        <img src="https://www.logo-voiture.com/wp-content/uploads/2021/01/ford-logo-2017-grand.png" alt="Ford" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
        <span style="display:none;font-size:24px;font-weight:900;color:#0066cc">FORD</span>
      </div>
      <div>
        <div class="brand-card-name">Ford FR</div>
        <div class="brand-card-desc">ford-reprise.fr<br>Homepage + Formulaire</div>
      </div>
      <div class="brand-status" id="status-Ford FR">
        <span class="dot loading"></span>
        <span>Chargement...</span>
      </div>
      <button class="enter-btn ford">Accéder au dashboard →</button>
    </div>
  </div>
</div>

<!-- ── DASHBOARD ── -->
<div id="dashboard">
  <div class="wrap">
    <button class="back-btn" onclick="goBack()">← Retour</button>
    <div class="dash-header">
      <img id="dash-logo" class="dash-logo" src="" alt="">
      <div class="dash-title-wrap">
        <h1 id="dash-title"></h1>
        <div class="ts"><span class="pulse-dot" id="pulse"></span><span id="updated">Chargement...</span></div>
      </div>
    </div>
    <div class="grid" id="kpis"></div>
    <div id="scards"></div>
    <div class="glass chart-wrap">
      <div class="section-title">Temps de réponse — historique</div>
      <div style="position:relative;width:100%;height:180px"><canvas id="rc"></canvas></div>
      <div class="legend" id="legend"></div>
    </div>
    <div class="glass incidents">
      <div class="section-title">Historique des incidents</div>
      <div id="history"><div class="empty">Chargement...</div></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const RAW_URL = "https://raw.githubusercontent.com/dcs-masterclass-ia/stla-monitor/main/status.json";

const BRAND_META = {
  "Opel PT": {
    logo: "https://www.stellantis.com/content/dam/stellantis-corporate/brands/opel/opel-logo.png",
    colors: ["#3b5ae0","#0F6E56"]
  },
  "Ford FR": {
    logo: "https://www.logo-voiture.com/wp-content/uploads/2021/01/ford-logo-2017-grand.png",
    colors: ["#0066cc","#1a9e6e"]
  }
};

let currentBrand = null;
let allData = null;
let chart = null;

// ── STATUS CARDS LANDING ──
function updateLandingStatus(data) {
  Object.keys(BRAND_META).forEach(brand => {
    const el = document.getElementById(`status-${brand}`);
    if (!el || !data.statuses[brand]) return;
    const pages = Object.values(data.statuses[brand]);
    const allOk = pages.every(s => s.ok);
    el.innerHTML = `
      <span class="dot ${allOk?'ok':'ko'}"></span>
      <span style="color:${allOk?'#16a34a':'#dc2626'}">${allOk?'Tout OK':'KO détecté'}</span>
    `;
  });
}

// ── NAVIGATION ──
function openDash(brand) {
  currentBrand = brand;
  document.getElementById('landing').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  const meta = BRAND_META[brand];
  document.getElementById('dash-logo').src = meta.logo;
  document.getElementById('dash-title').textContent = brand;
  if (allData) renderDash(allData);
}

function goBack() {
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('landing').style.display = 'flex';
  if (chart) { chart.destroy(); chart = null; }
}

// ── DASHBOARD RENDER ──
function statusIcon(ok) {
  return ok
    ? '<svg width="20" height="20" fill="none" stroke="#16a34a" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
    : '<svg width="20" height="20" fill="none" stroke="#dc2626" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
}

function renderDash(data) {
  const brand = currentBrand;
  const pages = Object.entries(data.statuses[brand] || {});
  const colors = BRAND_META[brand].colors;
  const allOk = pages.every(([,s]) => s.ok);
  const incCount = (data.history||[]).filter(h=>h.brand===brand&&h.type==='ko').length;
  const avgs = pages.map(([page])=>(data.avg_response||{})[`${brand}:${page}`]||0);
  const avg = avgs.length ? (avgs.reduce((a,b)=>a+b,0)/avgs.length).toFixed(2)+'s' : '—';

  // KPIs
  let kpiHTML = `
    <div class="glass kpi"><div class="kpi-label">Statut global</div><div class="kpi-val ${allOk?'ok':'ko'}">${allOk?'OK':'KO'}</div><div class="kpi-sub">${brand}</div></div>
    <div class="glass kpi"><div class="kpi-label">Incidents</div><div class="kpi-val blue">${incCount}</div><div class="kpi-sub">enregistrés</div></div>
    <div class="glass kpi"><div class="kpi-label">Moy. réponse</div><div class="kpi-val blue">${avg}</div><div class="kpi-sub">20 derniers checks</div></div>
  `;
  pages.forEach(([page,s]) => {
    kpiHTML += `<div class="glass kpi"><div class="kpi-label">${page}</div><div class="kpi-val ${s.ok?'ok':'ko'}">${s.ok?'OK':'KO'}</div><div class="kpi-sub">${s.elapsed}s · HTTP ${s.details?.http_status||'—'}</div></div>`;
  });
  document.getElementById('kpis').innerHTML = kpiHTML;

  // Scards
  document.getElementById('scards').innerHTML = pages.map(([page,s]) => {
    const d = s.details||{};
    const diagHTML = !s.ok ? `
      <div class="error-detail" id="diag-${page.replace(/\W/g,'_')}">
        <div class="diag-grid">
          ${d.error_type?`<div class="diag-item"><b>Type</b> : ${d.error_type}</div>`:''}
          ${d.ip?`<div class="diag-item"><b>IP</b> : ${d.ip}</div>`:''}
          ${d.dns_elapsed!=null?`<div class="diag-item"><b>DNS</b> : ${d.dns_elapsed}s</div>`:''}
          ${d.elapsed_http!=null?`<div class="diag-item"><b>HTTP</b> : ${d.elapsed_http}s</div>`:''}
          ${d.http_status?`<div class="diag-item"><b>Status</b> : ${d.http_status}</div>`:''}
          ${d.redirect_count?`<div class="diag-item"><b>Redirections</b> : ${d.redirect_count}</div>`:''}
          ${d.headers?.server&&d.headers.server!=='—'?`<div class="diag-item"><b>Serveur</b> : ${d.headers.server}</div>`:''}
          ${d.headers?.['x-cache']&&d.headers['x-cache']!=='—'?`<div class="diag-item"><b>X-Cache</b> : ${d.headers['x-cache']}</div>`:''}
          ${d.headers?.['cf-ray']&&d.headers['cf-ray']!=='—'?`<div class="diag-item"><b>CF-Ray</b> : ${d.headers['cf-ray']}</div>`:''}
          ${d.triggered_signature?`<div class="diag-item"><b>Signature KO</b> : ${d.triggered_signature}</div>`:''}
          ${d.error_detail?`<div class="diag-item" style="grid-column:1/-1"><b>Technique</b> : ${d.error_detail.substring(0,200)}</div>`:''}
        </div>
        ${d.body_preview?`<div class="diag-body">${d.body_preview.substring(0,300)}</div>`:''}
      </div>` : '';
    return `
      <div class="scard-wrap glass">
        <div class="scard" onclick="${!s.ok?`toggleDiag('${page.replace(/\W/g,'_')}')`:''}" style="border-radius:24px">
          <div class="scard-left">
            <div class="icon ${s.ok?'ok':'ko'}">${statusIcon(s.ok)}</div>
            <div>
              <div class="scard-name">${page}</div>
              <div class="scard-url">${s.url.replace('https://','')}</div>
            </div>
          </div>
          <div style="text-align:right">
            <span class="badge ${s.ok?'ok':'ko'}">${s.ok?'EN LIGNE':'KO'}</span>
            <div class="resp-time">${s.elapsed}s · ${s.reason}</div>
            ${!s.ok?'<div style="font-size:10px;color:#9ca3af;margin-top:3px">↓ diagnostic</div>':''}
          </div>
        </div>
        ${diagHTML}
      </div>`;
  }).join('');

  // Chart
  const datasets = pages.map(([page],i) => {
    const key = `${brand}:${page}`;
    const pts = (data.chart_data||{})[key]||[];
    return { label:page, data:pts.map(p=>p.elapsed), _times:pts.map(p=>p.time),
      borderColor:colors[i]||'#888', backgroundColor:(colors[i]||'#888')+'10',
      tension:0.4, pointRadius:2, borderWidth:2, fill:true };
  });
  const labels = datasets[0]?._times||[];
  document.getElementById('legend').innerHTML = datasets.map((ds,i)=>
    `<div class="leg-item"><span class="leg-dot" style="background:${colors[i]}"></span>${ds.label}</div>`
  ).join('');
  if (!chart) {
    chart = new Chart(document.getElementById('rc'),{
      type:'line', data:{labels,datasets},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{grid:{display:false},ticks:{font:{size:10},color:'#9ca3af',maxTicksLimit:8}},
          y:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:10},color:'#9ca3af',callback:v=>v.toFixed(1)+'s'}}
        }}
    });
  } else {
    chart.data.labels = labels;
    chart.data.datasets = datasets;
    chart.update();
  }

  // History
  const hist = (data.history||[]).filter(h=>h.brand===brand);
  const histEl = document.getElementById('history');
  if (!hist.length) { histEl.innerHTML='<div class="empty">Aucun incident enregistré.</div>'; return; }
  histEl.innerHTML = [...hist].reverse().slice(0,30).map(h=>`
    <div class="inc-row">
      <span class="inc-time">${h.time}</span>
      <div class="inc-desc">
        <div>${h.page} — ${h.detail}</div>
        ${h.diagnostics?.error_type?`<div class="inc-sub">Type : ${h.diagnostics.error_type}</div>`:''}
      </div>
      <span class="callout ${h.type==='recovery'?'ok':'ko'}">${h.type==='recovery'?'RÉSOLU':'KO'}</span>
    </div>`).join('');
}

function toggleDiag(key) {
  const el = document.getElementById(`diag-${key}`);
  if (el) el.classList.toggle('show');
}

// ── FETCH ──
async function fetchStatus() {
  try {
    const r = await fetch(RAW_URL+'?t='+Date.now());
    if (!r.ok) throw new Error();
    allData = await r.json();
    document.getElementById('updated').textContent = 'Mis à jour : '+allData.updated_at;
    document.getElementById('pulse').className = 'pulse-dot';
    updateLandingStatus(allData);
    if (currentBrand && document.getElementById('dashboard').style.display !== 'none') renderDash(allData);
  } catch(e) {
    document.getElementById('updated').textContent = 'Erreur de chargement';
    document.getElementById('pulse').className = 'pulse-dot dead';
  }
}

fetchStatus();
setInterval(fetchStatus, 15000);
</script>
</body>
</html>
