services:
  - type: web
    name: stla-monitor-server
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: PORT
        value: 8000

  - type: worker
    name: stla-monitor-script
    runtime: python
    buildCommand: pip install -r requirements_monitor.txt && playwright install chromium
    startCommand: python stla_monitor.py
    envVars:
      - key: GITHUB_TOKEN
        sync: false
